<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Book Reading Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf6f0;
      --brown-dark: #3b2a1a;
      --brown-mid: #6b4c2a;
      --brown-light: #c8a97e;
      --accent: #e07b39;
      --green: #4a7c59;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--brown-dark);
      min-height: 100vh;
    }

    h1, h2, h3, .font-display {
      font-family: 'Playfair Display', serif;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: #e8d9c5;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #c85a1a);
      transition: width 0.6s ease;
    }

    /* Book card */
    .book-card {
      background: white;
      border: 1px solid #e8d9c5;
      border-radius: 14px;
      padding: 20px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }
    .book-card:hover {
      box-shadow: 0 8px 24px rgba(59,42,26,0.1);
      transform: translateY(-2px);
    }

    /* Status badge */
    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
    }
    .badge-read { background:#d1fae5; color:#065f46; }
    .badge-reread { background:#dbeafe; color:#1e40af; }
    .badge-dnf { background:#fee2e2; color:#991b1b; }
    .badge-currently { background:#fef3c7; color:#92400e; }
    .badge-returned { background:#ede9fe; color:#5b21b6; }
    .badge-want { background:#f3f4f6; color:#374151; }

    /* Form styling */
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e8d9c5;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: #faf6f0;
      color: var(--brown-dark);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      background: white;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--brown-mid);
    }

    .btn-primary {
      background: var(--brown-dark);
      color: var(--cream);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.03em;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--brown-mid); transform: scale(1.02); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbb89a;
      font-size: 16px;
      transition: color 0.2s;
      padding: 4px;
    }
    .btn-delete:hover { color: #e53e3e; }

    /* Stat card */
    .stat-card {
      background: var(--brown-dark);
      color: var(--cream);
      border-radius: 14px;
      padding: 24px;
    }

    /* Section header */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 20px;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8d9c5;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--brown-dark);
      color: var(--cream);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .finished-ribbon {
      position: absolute;
      top: -1px; right: -1px;
      background: var(--green);
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 0 14px 0 8px;
    }

    #empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #c8a97e;
    }
  </style>
</head>
<body>

<!-- Header -->
<header style="background:var(--brown-dark); border-bottom:3px solid var(--accent);">
  <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-display text-white tracking-wide">📚 Reading Tracker</h1>
      <p style="color:#c8a97e; font-size:13px; margin-top:2px;">Follow your literary journey</p>
    </div>
    <button onclick="toggleForm()" id="toggle-btn" class="btn-primary" style="background:var(--accent);">
      + Add a Book
    </button>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">

  <!-- Add Book Form -->
  <div id="form-section" class="hidden mb-10">
    <div style="background:white; border:1px solid #e8d9c5; border-radius:16px; padding:32px;">
      <h2 class="font-display text-xl mb-6" style="color:var(--brown-dark);">Register a New Book</h2>
      <form id="book-form">
        <div class="grid grid-cols-1 gap-5" style="grid-template-columns: repeat(auto-fit, minmax(220px,1fr))">

          <div class="flex flex-col gap-1">
            <label>Title *</label>
            <input type="text" id="title" class="form-input" placeholder="Ex: The Alchemist" required />
          </div>

          <div class="flex flex-col gap-1">
            <label>Author *</label>
            <input type="text" id="author" class="form-input" placeholder="Ex: Paulo Coelho" required />
          </div>

          <div class="flex flex-col gap-1">
            <label>Total Pages *</label>
            <input type="number" id="numberOfPages" class="form-input" placeholder="Ex: 320" min="1" required />
          </div>

          <div class="flex flex-col gap-1">
            <label>Pages Read</label>
            <input type="number" id="numberOfPagesRead" class="form-input" placeholder="Ex: 150" min="0" value="0" />
          </div>

          <div class="flex flex-col gap-1">
            <label>Status *</label>
            <select id="status" class="form-input" required>
              <option value="">-- Choose --</option>
              <option value="Read">Read</option>
              <option value="Re-read">Re-read</option>
              <option value="DNF">DNF</option>
              <option value="Currently reading">Currently reading</option>
              <option value="Returned Unread">Returned Unread</option>
              <option value="Want to read">Want to read</option>
            </select>
          </div>

          <div class="flex flex-col gap-1">
            <label>Format *</label>
            <select id="format" class="form-input" required>
              <option value="">-- Choose --</option>
              <option value="Print">Print</option>
              <option value="PDF">PDF</option>
              <option value="Ebook">Ebook</option>
              <option value="AudioBook">AudioBook</option>
            </select>
          </div>

          <div class="flex flex-col gap-1">
            <label>Price (MAD)</label>
            <input type="number" id="price" class="form-input" placeholder="Ex: 120" min="0" step="0.01" value="0" />
          </div>

          <div class="flex flex-col gap-1">
            <label>Suggested by</label>
            <input type="text" id="suggestedBy" class="form-input" placeholder="Ex: A friend" />
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button type="submit" class="btn-primary">Save Book</button>
          <button type="button" onclick="toggleForm()" style="background:#f3ede4; color:var(--brown-mid); padding:12px 24px; border-radius:8px; border:none; cursor:pointer; font-weight:600; font-size:14px;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Global Statistics -->
  <div class="section-divider">
    <h2 class="font-display text-lg" style="color:var(--brown-dark);">Global Statistics</h2>
  </div>

  <div class="grid grid-cols-1 gap-4 mb-8" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr))">
    <div class="stat-card">
      <div style="font-size:28px; font-weight:700; font-family:'Playfair Display',serif" id="stat-total">0</div>
      <div style="font-size:12px; opacity:0.7; margin-top:4px; text-transform:uppercase; letter-spacing:0.05em;">Total Books</div>
    </div>
    <div class="stat-card" style="background:var(--green);">
      <div style="font-size:28px; font-weight:700; font-family:'Playfair Display',serif" id="stat-finished">0</div>
      <div style="font-size:12px; opacity:0.7; margin-top:4px; text-transform:uppercase; letter-spacing:0.05em;">Finished</div>
    </div>
    <div class="stat-card" style="background:var(--accent);">
      <div style="font-size:28px; font-weight:700; font-family:'Playfair Display',serif" id="stat-pages">0</div>
      <div style="font-size:12px; opacity:0.7; margin-top:4px; text-transform:uppercase; letter-spacing:0.05em;">Total Pages</div>
    </div>
    <div class="stat-card" style="background:var(--brown-mid);">
      <div style="font-size:28px; font-weight:700; font-family:'Playfair Display',serif" id="stat-pages-read">0</div>
      <div style="font-size:12px; opacity:0.7; margin-top:4px; text-transform:uppercase; letter-spacing:0.05em;">Pages Read</div>
    </div>
  </div>

  <!-- Book List -->
  <div class="section-divider">
    <h2 class="font-display text-lg" style="color:var(--brown-dark);">My Library</h2>
  </div>

  <div id="empty-state">
    <div style="font-size:48px;">📖</div>
    <p style="margin-top:12px; font-size:15px;">Your library is empty.<br/>Add your first book!</p>
  </div>

  <div id="book-list" class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr));"></div>

</main>

<!-- Toast notification -->
<div id="toast">✓ Book saved!</div>

<script>
// =====================
// TypeScript-style Book class (compiled to JS)
// =====================

const Status = {
  Read: "Read",
  ReRead: "Re-read",
  DNF: "DNF",
  CurrentlyReading: "Currently reading",
  ReturnedUnread: "Returned Unread",
  WantToRead: "Want to read",
};

const Format = {
  Print: "Print",
  PDF: "PDF",
  Ebook: "Ebook",
  AudioBook: "AudioBook",
};

class Book {
  constructor(title, author, numberOfPages, status, price, numberOfPagesRead, format, suggestedBy) {
    this.title = title;
    this.author = author;
    this.numberOfPages = numberOfPages;
    this.status = status;
    this.price = price;
    this.numberOfPagesRead = Math.min(numberOfPagesRead, numberOfPages);
    this.format = format;
    this.suggestedBy = suggestedBy;
    // finished auto-set
    this.finished = this.numberOfPagesRead >= this.numberOfPages && this.numberOfPages > 0;
    this.id = Date.now().toString() + Math.random().toString(36).slice(2);
  }

  currentlyAt() {
    if (this.numberOfPages === 0) return 0;
    const percent = (this.numberOfPagesRead / this.numberOfPages) * 100;
    return Math.min(Math.round(percent * 10) / 10, 100);
  }

  deleteBook() {
    return `Book "${this.title}" has been deleted.`;
  }
}

// =====================
// "MongoDB" simulation via localStorage
// =====================
const DB_KEY = "book_tracker_db";

function loadBooks() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch { return []; }
}

function saveBooks(books) {
  localStorage.setItem(DB_KEY, JSON.stringify(books));
}

function addBookToDB(bookData) {
  const books = loadBooks();
  books.push(bookData);
  saveBooks(books);
}

function deleteBookFromDB(id) {
  const books = loadBooks().filter(b => b.id !== id);
  saveBooks(books);
}

// =====================
// UI Logic
// =====================

function toggleForm() {
  const section = document.getElementById('form-section');
  section.classList.toggle('hidden');
  const btn = document.getElementById('toggle-btn');
  btn.textContent = section.classList.contains('hidden') ? '+ Add a Book' : '✕ Close';
}

function getBadgeClass(status) {
  const map = {
    "Read": "badge-read",
    "Re-read": "badge-reread",
    "DNF": "badge-dnf",
    "Currently reading": "badge-currently",
    "Returned Unread": "badge-returned",
    "Want to read": "badge-want",
  };
  return map[status] || "badge-want";
}

function getFormatIcon(format) {
  const icons = { Print: "📖", PDF: "📄", Ebook: "📱", AudioBook: "🎧" };
  return icons[format] || "📚";
}

function renderBooks() {
  const books = loadBooks();
  const container = document.getElementById('book-list');
  const empty = document.getElementById('empty-state');
  container.innerHTML = '';

  if (books.length === 0) {
    empty.style.display = 'block';
    updateStats([]);
    return;
  }
  empty.style.display = 'none';

  books.forEach(data => {
    const book = Object.assign(new Book('','',1,'',0,0,'',''), data);
    const pct = book.currentlyAt();

    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      ${book.finished ? '<div class="finished-ribbon">✓ Finished</div>' : ''}
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:12px;">
        <div>
          <div style="font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:var(--brown-dark); line-height:1.3;">${escapeHtml(book.title)}</div>
          <div style="font-size:13px; color:#a08060; margin-top:3px;">${escapeHtml(book.author)}</div>
        </div>
        <button class="btn-delete" onclick="handleDelete('${book.id}')" title="Delete book">🗑</button>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;">
        <span class="badge ${getBadgeClass(book.status)}">${book.status}</span>
        <span class="badge" style="background:#f3ede4; color:var(--brown-mid);">${getFormatIcon(book.format)} ${book.format}</span>
      </div>

      <div style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--brown-mid); margin-bottom:5px;">
          <span>${book.numberOfPagesRead} / ${book.numberOfPages} pages</span>
          <span style="font-weight:700; color:var(--accent);">${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; font-size:12px; color:#bda07a; margin-top:12px; border-top:1px solid #f0e8d8; padding-top:10px;">
        <span>${book.price > 0 ? book.price + ' MAD' : 'Free'}</span>
        ${book.suggestedBy ? `<span>💬 ${escapeHtml(book.suggestedBy)}</span>` : ''}
      </div>
    `;
    container.appendChild(card);
  });

  updateStats(books);
}

function updateStats(books) {
  document.getElementById('stat-total').textContent = books.length;
  document.getElementById('stat-finished').textContent = books.filter(b => b.finished).length;
  document.getElementById('stat-pages').textContent = books.reduce((s, b) => s + (b.numberOfPages || 0), 0).toLocaleString();
  document.getElementById('stat-pages-read').textContent = books.reduce((s, b) => s + (b.numberOfPagesRead || 0), 0).toLocaleString();
}

function handleDelete(id) {
  const books = loadBooks();
  const book = books.find(b => b.id === id);
  if (!book) return;
  const dummy = Object.assign(new Book('','',1,'',0,0,'',''), book);
  console.log(dummy.deleteBook()); // Appel de la méthode deleteBook()
  if (confirm(`Delete "${book.title}"?`)) {
    deleteBookFromDB(id);
    renderBooks();
    showToast('Book deleted!');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================
// Form Submit
// =====================
document.getElementById('book-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const title = document.getElementById('title').value.trim();
  const author = document.getElementById('author').value.trim();
  const numberOfPages = parseInt(document.getElementById('numberOfPages').value);
  const numberOfPagesRead = parseInt(document.getElementById('numberOfPagesRead').value) || 0;
  const status = document.getElementById('status').value;
  const format = document.getElementById('format').value;
  const price = parseFloat(document.getElementById('price').value) || 0;
  const suggestedBy = document.getElementById('suggestedBy').value.trim();

  if (numberOfPagesRead > numberOfPages) {
    alert('Pages read cannot exceed total pages!');
    return;
  }

  const book = new Book(title, author, numberOfPages, status, price, numberOfPagesRead, format, suggestedBy);

  // Simulate storing in MongoDB
  addBookToDB(book);

  // Reset form
  this.reset();
  document.getElementById('numberOfPagesRead').value = 0;
  document.getElementById('price').value = 0;

  toggleForm();
  renderBooks();
  showToast('✓ Book saved!');
});

// Initial render
renderBooks();
</script>

</body>
</html>
